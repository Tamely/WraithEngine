name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpp:
    name: C++ Build & Test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-ninja-cmake
          restore-keys: brew-${{ runner.os }}-

      - name: Install build tools
        run: brew install ninja cmake

      - name: Install Vulkan SDK
        # The vulkan-sdk Homebrew cask was removed; install the individual formulae instead.
        run: brew install molten-vk vulkan-headers

      - name: Set Vulkan environment
        run: |
          BREW_PREFIX=$(brew --prefix)
          echo "VULKAN_SDK=$BREW_PREFIX" >> $GITHUB_ENV
          echo "$BREW_PREFIX/bin" >> $GITHUB_PATH

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build/debug/_deps
            build/debug/ThirdParty
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'ThirdParty/**') }}
          restore-keys: cmake-${{ runner.os }}-

      - name: Build Coral.Managed
        run: dotnet build ThirdParty/Coral/Coral.Managed/Coral.Managed-Static.csproj -c Debug --nologo

      - name: Build WraithEngine.Managed
        run: dotnet build Scripting/WraithEngine.Managed/WraithEngine.Managed.csproj -c Debug --nologo

      - name: Build test scripts
        run: |
          dotnet build Tests/TestScripts/WraithTestScripts/WraithTestScripts.csproj -c Debug --nologo
          dotnet build Tests/TestScripts/WraithRestrictedScript/WraithRestrictedScript.csproj -c Debug --nologo

      - name: Configure
        run: cmake --preset debug -DBUILD_TESTING=ON -DAXIOM_ENABLE_SCRIPTING=ON

      - name: Build
        run: cmake --build build/debug

      - name: Test
        run: ctest --test-dir build/debug --output-on-failure

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: EditorFrontend

    steps:
      - uses: actions/checkout@v4

      # pnpm must be set up before setup-node so the built-in cache can locate the store.
      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: EditorFrontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_AXIOM_SERVER_ORIGIN: http://localhost:8080
